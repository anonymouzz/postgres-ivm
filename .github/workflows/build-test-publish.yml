name: Build, Test and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    name: Build and Test (${{ matrix.base_os }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base_os: [trixie, bullseye]
        arch: [amd64, arm64]
        include:
          - base_os: trixie
            tag: 16-3.6-trixie
            is_latest: true
          - base_os: bullseye
            tag: 16-3.5-bullseye
            is_latest: false

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export DEB packages
        run: |
          make clean export-deb \
            BASE_OS=${{ matrix.base_os }} \
            TARGET_PLATFORM=linux/${{ matrix.arch }} \
            BUILD_ID=${{ github.run_id }}

      - name: Build Local for Testing
        run: |
          make build-load \
            BASE_OS=${{ matrix.base_os }} \
            TARGET_PLATFORM=linux/${{ matrix.arch }} \
            IMAGE_NAME=postgresql-ivm \
            IMAGE_TAG=test-latest

      - name: Run Deep Functional Tests
        run: make test IMAGE_TAG=test-latest

      - name: Upload DEB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-16-pg-ivm-deb-${{ matrix.base_os }}-${{ matrix.arch }}
          path: dist/*.deb

      - name: Build and Push Final Multi-arch Image
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@v6
        with:
          context: ./postgres
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_OS=${{ matrix.base_os }}
          tags: |
            ${{ secrets.REGISTRY_IMAGE_PREFIX }}/postgresql-ivm:${{ matrix.tag }}
            ${{ matrix.is_latest && format('{0}/postgresql-ivm:latest', secrets.REGISTRY_IMAGE_PREFIX) || '' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=anonymouz
            version.base_os=${{ matrix.base_os }}

  publish:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.deb
          generate_release_notes: true
