name: Build, Test and Publish

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*" # Триггер на релизные теги v1.0.0 и т.д.
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Test (${{ matrix.base_os }} / ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base_os: [trixie, bullseye]
        arch: [amd64, arm64]
        include:
          - base_os: trixie
            tag: 16-3.6-trixie
            is_latest: true
          - base_os: bullseye
            tag: 16-3.5-bullseye
            is_latest: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export DEB packages
        run: |
          make clean export-deb \
            BASE_OS=${{ matrix.base_os }} \
            TARGET_PLATFORM=linux/${{ matrix.arch }} \
            BUILD_ID=${{ github.run_id }}

      - name: Build Local for Testing
        run: |
          make build-load \
            BASE_OS=${{ matrix.base_os }} \
            TARGET_PLATFORM=linux/${{ matrix.arch }} \
            IMAGE_NAME=postgresql-ivm \
            IMAGE_TAG=test-latest

      - name: Run Deep Functional Tests
        run: make test IMAGE_TAG=test-latest

      - name: Upload DEB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-16-pg-ivm-deb-${{ matrix.base_os }}-${{ matrix.arch }}
          path: dist/*.deb
          retention-days: 1
          if-no-files-found: error

      - name: Build and Push Final Multi-arch Image
        if: matrix.arch == 'amd64' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./postgres
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          outputs: type=registry
          push: true
          build-args: |
            BASE_OS=${{ matrix.base_os }}
          tags: |
            ${{ secrets.REGISTRY_IMAGE_PREFIX }}/postgresql-ivm:${{ matrix.tag }}
            ${{ matrix.is_latest && format('{0}/postgresql-ivm:latest', secrets.REGISTRY_IMAGE_PREFIX) || '' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=anonymouz
            version.base_os=${{ matrix.base_os }}

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download DEB artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: postgresql-16-pg-ivm-deb-*
          path: release-artifacts
          merge-multiple: true

      - name: Check downloaded files
        run: ls -R release-artifacts/

      - name: Generate Checksums
        working-directory: release-artifacts
        run: |
          sha256sum *.deb > SHA256SUMS
          echo "### Checksums generated:"
          cat SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.deb
            release-artifacts/SHA256SUMS
          generate_release_notes: true
          body: |
            ### PostgreSQL + pg_ivm Infrastructure Release
            Automated build of PostgreSQL 16 with pg-ivm.

            **OS versions included:** trixie, bullseye.
            **Architectures:** amd64, arm64.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
